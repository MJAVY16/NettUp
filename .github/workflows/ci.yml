name: CI

# Runs on every push and pull request so broken code is caught before merge.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    name: Test, type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Type-check renderer
        run: npx tsc -p tsconfig.json --noEmit

      - name: Type-check main process
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Production build
        run: npm run build
