name: Release

# Publishes a new release whenever you push a version tag like v1.0.2.
# electron-builder builds the installer and uploads it (plus latest.yml, which
# the in-app updater reads) to a GitHub Release.
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # allows electron-builder to create the GitHub Release

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer + main
        run: npm run build

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
